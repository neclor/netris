name: Deploy game (Server)

on:
  workflow_run:
    workflows: [Build game (Web)]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy to server
        env:
          HOST: ${{ secrets.SSH_HOST }}
          USER: ${{ secrets.SSH_USER }}
          PORT: ${{ secrets.SSH_PORT }}
          KEY: ${{ secrets.SSH_KEY }}

          WEB_DIR: ${{ vars.WEB_DIR }}

        run: |
          echo "$KEY" > ssh_key
          chmod 600 ssh_key

          ssh -i ssh_key \
            -p $PORT \
            -o StrictHostKeyChecking=no \
            $USER@$HOST \
            "curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/netris-web.zip \
              -o /tmp/netris-web.zip \
              && unzip -o /tmp/netris-web.zip -d $WEB_DIR \
              && rm /tmp/netris-web.zip"

          rm ssh_key
