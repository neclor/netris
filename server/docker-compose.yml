name: netris

services:
  netris-server:
    image: ghcr.io/neclor/netris/server:latest
    container_name: netris-server
    env_file: .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Leaderboard__FilePath: /app/data/leaderboard.csv
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - netris-data:/app/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: journald

volumes:
  netris-data:
